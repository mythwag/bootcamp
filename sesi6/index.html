<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griya Artisan | Katalog Produk Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<div class="hero-section text-center text-white">
    <div class="container">
        <h1 class="fw-bold display-4 mb-2">Griya Artisan</h1>
        <p class="lead opacity-75 fw-light">Cita Rasa, Karya Seni, & Aset Digital Pilihan</p>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center mb-5">
        <div class="col-lg-10">
            <div class="toolbar-container">
                <div class="row g-3 justify-content-between align-items-center">
                    <div class="col-md-5">
                        <div class="input-group search-input-group">
                            <input type="text" id="searchInput" class="form-control" placeholder="Cari nama karya...">
                            <span class="input-group-text"><i class="fa fa-search"></i></span>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div id="categoryFilterPills">
                            <button class="filter-pill active" data-category="Semua">Semua</button>
                            <button class="filter-pill" data-category="Minuman">Minuman</button>
                            <button class="filter-pill" data-category="Makanan">Makanan</button>
                            <button class="filter-pill" data-category="Kesenian">Kesenian</button>
                            <button class="filter-pill" data-category="Digital">Digital</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="emptyState" class="text-center py-5 d-none">
        <i class="fa fa-box-open display-1 mb-4"></i>
        <h3 class="fw-semibold text-muted">Aduh, Produk Tidak Ketemu</h3>
        <p class="text-muted fw-light">Coba ganti kata kunci atau pilih kategori lain.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4" id="productGrid">
        </div>
</div>
</body>
<script src="script.js"></script>
</html>
