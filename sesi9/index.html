<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griya Artisan | Katalog Produk Modern</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-section text-center text-white">
    <div class="container">
        <h1 class="fw-bold display-4 mb-2">Griya Artisan</h1>
        <p class="lead opacity-75 fw-light">Cita Rasa, Karya Seni, & Aset Digital Pilihan</p>
    </div>
</div>

<div class="container pb-5">
    
    <div class="row justify-content-center mb-4">
        <div class="col-lg-8 col-md-10">
            <div class="toolbar-container">
                <div class="row g-2 align-items-center">
                    <div class="col-sm-6">
                        <div class="input-group search-input-group">
                            <input type="text" id="searchInput" class="form-control" placeholder="Cari nama karya...">
                            <span class="input-group-text"><i class="fa fa-search fa-sm"></i></span>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="d-flex gap-2">
                            <select id="categorySelect" class="form-select category-select">
                                <option value="Semua">All Categories</option>
                                <option value="Minuman">Minuman</option>
                                <option value="Makanan">Makanan</option>
                                <option value="Kesenian">Kesenian</option>
                                <option value="Digital">Digital</option>
                                <option value="Elektronik">Elektronik</option>
                                <option value="Pakaian">Pakaian</option>
                            </select>

                            <button id="filterBtn" class="btn btn-filter">
                                <i class="fa fa-sliders-h me-1.5"></i>Filter
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="emptyState" class="text-center py-5 d-none">
        <i class="fa fa-box-open display-1 mb-4 text-muted opacity-50"></i>
        <h3 class="fw-semibold text-muted">Aduh, Produk Tidak Ketemu</h3>
        <p class="text-muted fw-light">Coba ganti kata kunci atau pilih kategori lain.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4 mt-2" id="productGrid">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
